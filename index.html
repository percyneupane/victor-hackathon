<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Hackathon Voting App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏆 Hackathon Voting App</h1>
            <p>Vote for your favorite projects!</p>
        </div>

        <!-- Authentication Section -->
        <div class="auth-section">
            <div class="code-input-group" style="margin-bottom: 10px;">
                <label for="voterName">Enter Your Name:</label>
                <input type="text" id="voterName" placeholder="Enter your full name" autocomplete="off">
            </div>
            <div class="code-input-group">
                <label for="votingCode">Enter Your Voting Code:</label>
                <input type="text" id="votingCode" placeholder="Enter your access code" autocomplete="off">
                <button onclick="setVotingCode()">Submit Code</button>
            </div>
            <div id="codeStatus" class="status-message"></div>
        </div>

        <!-- User Info -->
        <div id="userInfo" class="user-info" style="display: none;"></div>

        <!-- Voting Section -->
        <div id="votingSection" style="display: none;">
            <!-- Projects Grid -->
            <div class="projects-grid" id="projectsGrid">
                <!-- Projects will be dynamically loaded here by script.js -->
            </div>

            <!-- Change Code Button -->
            <div class="footer">
                <button class="change-code-btn" onclick="resetVoting()">Change Voting Code</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
